<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PhishLogic</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <h1>🛡️ PhishLogic</h1>
      <p class="tagline">Phishing Detection</p>
    </header>

    <!-- Connection Status -->
    <div class="status-bar">
      <div class="status-indicator" id="statusIndicator">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">Checking connection...</span>
      </div>
      <button class="btn-settings" id="settingsBtn" title="Settings">⚙️</button>
    </div>

    <!-- Stats Summary -->
    <div class="stats" id="stats">
      <div class="stat-item stat-safe">
        <div class="stat-value" id="safeCount">0</div>
        <div class="stat-label">Safe</div>
      </div>
      <div class="stat-item stat-suspicious">
        <div class="stat-value" id="suspiciousCount">0</div>
        <div class="stat-label">Suspicious</div>
      </div>
      <div class="stat-item stat-malicious">
        <div class="stat-value" id="maliciousCount">0</div>
        <div class="stat-label">Malicious</div>
      </div>
    </div>

    <!-- History -->
    <div class="history-section">
      <div class="history-header">
        <h2>Recent Analysis</h2>
        <button class="btn-clear" id="clearBtn">Clear</button>
      </div>
      <div class="history-list" id="historyList">
        <div class="empty-state">
          <p>No analysis history yet</p>
          <p class="empty-hint">Right-click any link and select "Check for Phishing with PhishLogic"</p>
        </div>
      </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal" id="settingsModal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Settings</h2>
          <button class="btn-close" id="closeModal">&times;</button>
        </div>
        <div class="modal-body">
          <label for="apiEndpoint">API Endpoint:</label>
          <input
            type="text"
            id="apiEndpoint"
            placeholder="http://localhost:3000"
            value="http://localhost:3000"
          />
          <p class="help-text">
            Default: http://localhost:3000<br>
            Production: https://your-api-domain.com
          </p>
        </div>
        <div class="modal-footer">
          <button class="btn-cancel" id="cancelBtn">Cancel</button>
          <button class="btn-save" id="saveBtn">Save</button>
        </div>
      </div>
    </div>
  </div>

  <script src="../utils.js"></script>
  <script src="popup.js"></script>
</body>
</html>
