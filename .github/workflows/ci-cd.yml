name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: gcr.io
  IMAGE_NAME: phishlogic
  NODE_VERSION: '22'

jobs:
  # ============================================================================
  # Security Scanning
  # ============================================================================
  security:
    name: Security Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for SSL bypass patterns
        run: |
          echo "Checking for SSL bypass patterns..."

          # Check for rejectUnauthorized: false
          if grep -r "rejectUnauthorized.*false" src/; then
            echo "❌ ERROR: Found 'rejectUnauthorized: false' in source code"
            exit 1
          fi

          # Check for NODE_TLS_REJECT_UNAUTHORIZED in code
          if grep -r "NODE_TLS_REJECT_UNAUTHORIZED.*0" src/; then
            echo "❌ ERROR: Found 'NODE_TLS_REJECT_UNAUTHORIZED=0' in source code"
            exit 1
          fi

          # Check .env files (should not exist in repo)
          if [ -f .env ] || [ -f .env.local ]; then
            echo "❌ ERROR: Found .env files in repository"
            exit 1
          fi

          echo "✅ No SSL bypass patterns found"

      - name: Check for hardcoded secrets
        run: |
          echo "Checking for hardcoded secrets..."

          # Check for common secret patterns
          if grep -rE "(password|secret|key|token)\s*=\s*['\"][^'\"]{10,}" src/ --include="*.ts" --include="*.js"; then
            echo "⚠️  WARNING: Potential hardcoded secrets found. Please review."
          else
            echo "✅ No obvious hardcoded secrets found"
          fi

      - name: Run npm audit
        run: |
          npm audit --production --audit-level=high || true
          echo "✅ NPM audit complete (vulnerabilities logged)"

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'
          exit-code: '0'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # ============================================================================
  # Linting
  # ============================================================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type check
        run: npm run typecheck

  # ============================================================================
  # Testing
  # ============================================================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run unit tests
        run: npm run test:unit

      - name: Run integration tests
        run: npm run test:integration || true
        env:
          NODE_ENV: test

      - name: Generate coverage report
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  # ============================================================================
  # Build Docker Image
  # ============================================================================
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [security, lint, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Test Docker image health check
        run: |
          echo "Starting container..."
          docker run -d --name test-container -p 8080:8080 \
            -e NODE_ENV=production \
            -e DB_HOST=localhost \
            -e DB_PASSWORD=test \
            -e JWT_SECRET=test-secret-key-minimum-32-characters \
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

          echo "Waiting for container to be healthy..."
          sleep 10

          echo "Checking health endpoint..."
          curl -f http://localhost:8080/health || exit 1

          echo "✅ Health check passed"

          docker stop test-container
          docker rm test-container

  # ============================================================================
  # Deploy to Staging (Auto-deploy from develop branch)
  # ============================================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment:
      name: staging
      url: https://phishlogic-staging.run.app
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker

      - name: Build and push Docker image
        run: |
          IMAGE_TAG="${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:staging-${{ github.sha }}"
          docker build -t $IMAGE_TAG .
          docker push $IMAGE_TAG

      - name: Deploy to Cloud Run (Staging)
        run: |
          gcloud run deploy phishlogic-staging \
            --image ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:staging-${{ github.sha }} \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated \
            --memory 2Gi \
            --cpu 2 \
            --timeout 60s \
            --max-instances 5 \
            --set-secrets=DB_PASSWORD=db-password-staging:latest,JWT_SECRET=jwt-secret-staging:latest \
            --set-env-vars NODE_ENV=production,DB_SSL=true

      - name: Verify deployment
        run: |
          SERVICE_URL=$(gcloud run services describe phishlogic-staging \
            --platform managed \
            --region us-central1 \
            --format 'value(status.url)')

          echo "Staging URL: $SERVICE_URL"

          curl -f $SERVICE_URL/health || exit 1
          echo "✅ Staging deployment verified"

  # ============================================================================
  # Deploy to Production (Manual approval required)
  # ============================================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://phishlogic.run.app
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker

      - name: Build and push Docker image
        run: |
          IMAGE_TAG="${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:prod-${{ github.sha }}"
          docker build -t $IMAGE_TAG .
          docker tag $IMAGE_TAG ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:latest
          docker push $IMAGE_TAG
          docker push ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Cloud Run (Production)
        run: |
          gcloud run deploy phishlogic \
            --image ${{ env.REGISTRY }}/${{ secrets.GCP_PROJECT_ID }}/${{ env.IMAGE_NAME }}:prod-${{ github.sha }} \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated \
            --memory 2Gi \
            --cpu 2 \
            --timeout 60s \
            --max-instances 10 \
            --min-instances 1 \
            --set-secrets=DB_PASSWORD=db-password-prod:latest,JWT_SECRET=jwt-secret-prod:latest,SCIM_ENCRYPTION_KEY=scim-encryption-key:latest \
            --set-env-vars NODE_ENV=production,DB_SSL=true,TRUST_PROXY=true

      - name: Verify production deployment
        run: |
          SERVICE_URL=$(gcloud run services describe phishlogic \
            --platform managed \
            --region us-central1 \
            --format 'value(status.url)')

          echo "Production URL: $SERVICE_URL"

          # Wait for service to be ready
          sleep 15

          curl -f $SERVICE_URL/health || exit 1
          echo "✅ Production deployment verified"

      - name: Create GitHub release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}
          release_name: Release v${{ github.run_number }}
          body: |
            Production deployment of PhishLogic

            **Commit**: ${{ github.sha }}
            **Branch**: ${{ github.ref }}
            **Deploy Time**: ${{ github.event.head_commit.timestamp }}
          draft: false
          prerelease: false
